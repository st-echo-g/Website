<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Echo St. Germain · Photography</title>
    <style>
      body {
        --bg: #d9d9d9;
        --text: #000000;
        background: var(--bg);
        color: var(--text);
        max-width: 1100px;
        margin: 0 auto;
        padding: 40px clamp(20px, 8vw, 200px) 60px;
      }
      a {
        color: var(--text);
      }
      .back {
        display: inline-block;
        margin-bottom: 24px;
      }
      h1 {
        margin-top: 0;
      }
      .gallery {
        display: flex;
        gap: 10px;
      }
      .col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .gallery img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 8px;
        border: 1px solid var(--text);
      }
    </style>
  </head>
  <body>
    <a class="back" href="index.html">&larr; Home</a>
    <h1>Photography</h1>

    <div class="gallery"></div>

    <script>
      const gallery = document.querySelector('.gallery');
      const TOTAL = 70;

      // Build the list of photos: pictures/photo-01-small.jpg ... photo-70-small.jpg
      const photos = [];
      for (let n = 1; n <= TOTAL; n++) {
        const img = document.createElement('img');
        img.src = `pictures/photo-${String(n).padStart(2, '0')}-small.jpg`;
        img.alt = 'Photograph';
        img.loading = 'lazy';
        photos.push(img);
      }

      // Deal the photos across the columns so the top row fills first.
      function layout() {
        const columnCount = window.innerWidth <= 500 ? 2 : 4;
        gallery.innerHTML = '';
        const columns = [];
        for (let i = 0; i < columnCount; i++) {
          const col = document.createElement('div');
          col.className = 'col';
          gallery.appendChild(col);
          columns.push(col);
        }
        photos.forEach((img, i) => columns[i % columnCount].appendChild(img));
      }

      layout();
      window.addEventListener('resize', layout);
    </script>
  </body>
</html>

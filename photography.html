<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
    <title>Echo St. Germain · Photography</title>
    <style>
      h1 {
        margin-top: 0;
      }
      .gallery {
        display: flex;
        gap: 10px;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .gallery.ready {
        opacity: 1;
      }
      .col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .gallery img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 0;
        border: 1px solid var(--text);
      }
      .controls {
        margin-bottom: 20px;
      }
      .controls select {
        font-size: 1em;
        padding: 4px 8px;
      }
    </style>
  </head>
  <body>
    <a class="back" href="index.html">&larr; Home</a>
    <h1>Photography</h1>

    <div class="controls">
      <label for="tagFilter">Filter by tag: </label>
      <select id="tagFilter">
        <option value="">All</option>
      </select>
    </div>

    <div class="gallery"></div>

    <script>
      const gallery = document.querySelector('.gallery');
      const TOTAL = 70;

      // Parse a CSV line, honoring double-quoted fields that may contain commas.
      function parseCsvLine(line) {
        const fields = [];
        let field = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (inQuotes) {
            if (ch === '"' && line[i + 1] === '"') {
              field += '"';
              i++;
            } else if (ch === '"') {
              inQuotes = false;
            } else {
              field += ch;
            }
          } else if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            fields.push(field);
            field = '';
          } else {
            field += ch;
          }
        }
        fields.push(field);
        return fields;
      }

      // Load photos.csv (Filename, Description, Tags) into a map keyed by filename.
      async function loadPhotoInfo() {
        const info = {};
        try {
          const res = await fetch('photos.csv');
          const text = await res.text();
          const lines = text.split(/\r?\n/).filter((line) => line.length > 0);
          for (const line of lines.slice(1)) {
            const [filename, description, tags] = parseCsvLine(line);
            info[filename] = { description: description || '', tags: tags || '' };
          }
        } catch (err) {
          console.warn('Could not load photos.csv', err);
        }
        return info;
      }

      // Build the list of photos: pictures/photo-01-small.jpg ... photo-70-small.jpg
      async function buildPhotos() {
        const info = await loadPhotoInfo();
        const photos = [];
        for (let n = 1; n <= TOTAL; n++) {
          const filename = `photo-${String(n).padStart(2, '0')}-small.jpg`;
          const { description = '', tags = '' } = info[filename] || {};
          const img = document.createElement('img');
          img.src = `pictures/${filename}`;
          img.alt = description || 'Photograph';
          if (description) img.title = description;
          if (tags) img.dataset.tags = tags;
          img.loading = 'lazy';
          photos.push(img);
        }
        return photos;
      }

      buildPhotos().then((photos) => {
        const tagFilter = document.getElementById('tagFilter');

        // Populate the tag dropdown with every tag found across all photos.
        const allTags = new Set();
        photos.forEach((img) => {
          (img.dataset.tags || '').split(',').filter(Boolean).forEach((tag) => allTags.add(tag));
        });
        [...allTags].sort().forEach((tag) => {
          const option = document.createElement('option');
          option.value = tag;
          option.textContent = tag;
          tagFilter.appendChild(option);
        });

        // Deal the visible photos across the columns so the top row fills first.
        function layout() {
          const selectedTag = tagFilter.value;
          const visible = selectedTag
            ? photos.filter((img) => (img.dataset.tags || '').split(',').includes(selectedTag))
            : photos;

          const columnCount = window.innerWidth <= 500 ? 2 : 4;
          gallery.innerHTML = '';
          const columns = [];
          for (let i = 0; i < columnCount; i++) {
            const col = document.createElement('div');
            col.className = 'col';
            gallery.appendChild(col);
            columns.push(col);
          }
          visible.forEach((img, i) => columns[i % columnCount].appendChild(img));
        }

        layout();
        window.addEventListener('resize', layout);
        tagFilter.addEventListener('change', layout);

        // Reveal the gallery once every image has loaded, so the reflow is hidden.
        let remaining = photos.length;
        const markLoaded = () => {
          remaining--;
          if (remaining <= 0) gallery.classList.add('ready');
        };
        photos.forEach((img) => {
          if (img.complete) markLoaded();
          else {
            img.addEventListener('load', markLoaded, { once: true });
            img.addEventListener('error', markLoaded, { once: true });
          }
        });
      });
    </script>
    <script src="theme.js"></script>
  </body>
</html>
